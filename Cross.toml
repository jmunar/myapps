[target.aarch64-unknown-linux-gnu]
# OpenSSL is vendored via --features vendored-openssl (no system packages needed)
# zlib dev headers needed by libz-sys (used by curl-sys) during cross-compilation
pre-build = [
    "dpkg --add-architecture $CROSS_DEB_ARCH",
    "apt-get update && apt-get install --assume-yes zlib1g-dev:$CROSS_DEB_ARCH"
]
