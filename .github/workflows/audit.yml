name: Security Audit

on:
  pull_request:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
  schedule:
    - cron: "0 8 * * 1" # Every Monday at 08:00 UTC

permissions:
  contents: read

jobs:
  audit:
    name: Cargo Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
