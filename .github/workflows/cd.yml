name: CD

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump override (auto-detected from commits if empty)"
        required: false
        type: choice
        options:
          - ""
          - patch
          - minor
          - major
  push:
    branches: [main]

concurrency:
  group: cd-deploy
  cancel-in-progress: false

jobs:
  release:
    name: Build & release
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[release]')"
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Determine version bump
        id: version
        run: |
          CURRENT=$(sed -n '/^\[package\]/,/^\[/{s/^version = "\(.*\)"/\1/p}' Cargo.toml)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          BUMP="${{ inputs.bump }}"
          if [[ -z "$BUMP" ]]; then
            LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
            if [[ -n "$LAST_TAG" ]]; then
              COMMITS=$(git log "$LAST_TAG"..HEAD --format=%s)
            else
              COMMITS=$(git log --format=%s)
            fi

            if echo "$COMMITS" | grep -qi '\[breaking'; then
              BUMP=major
            elif echo "$COMMITS" | grep -qi '\[feat'; then
              BUMP=minor
            else
              BUMP=patch
            fi
          fi

          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          VERSION="$MAJOR.$MINOR.$PATCH"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Bumping $CURRENT → $VERSION ($BUMP)"

      - name: Bump version
        run: |
          sed -i '/^\[package\]/,/^\[/{s/^version = ".*"/version = "${{ steps.version.outputs.version }}"/}' Cargo.toml
          RUSTC_WRAPPER="" cargo generate-lockfile

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock
          git commit -m "[release] v${{ steps.version.outputs.version }}"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin HEAD:main --tags

      - uses: Swatinem/rust-cache@v2.9.1
        with:
          key: aarch64

      - name: Install cross
        uses: taiki-e/install-action@cross

      - name: Cross-compile for aarch64
        run: cross build --release --target aarch64-unknown-linux-gnu
        env:
          RUSTC_WRAPPER: ""

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: target/aarch64-unknown-linux-gnu/release/myapps

  deploy-stage:
    name: Deploy to staging
    needs: release
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v6

      - name: Download release binary
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p release-binary
          gh release download "${{ needs.release.outputs.tag }}" \
            --pattern "myapps" \
            --dir ./release-binary
          chmod +x ./release-binary/myapps

      - name: Mask sensitive values
        run: |
          echo "::add-mask::${{ vars.DEPLOY_SERVER }}"
          echo "::add-mask::$(echo "${{ vars.DEPLOY_SERVER }}" | cut -d@ -f2)"
          echo "::add-mask::${{ vars.DEPLOY_DOMAIN }}"
          echo "::add-mask::${{ vars.DEPLOY_REMOTE_DIR }}"

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "${{ secrets.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts
          cat >> ~/.ssh/config <<EOF
          Host deploy-target
            HostName $(echo "${{ vars.DEPLOY_SERVER }}" | cut -d@ -f2)
            User $(echo "${{ vars.DEPLOY_SERVER }}" | cut -d@ -f1)
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking yes
          EOF

      - name: Generate deploy config
        run: |
          cat > deploy/stage.env <<EOF
          DEPLOY_DOMAIN=${{ vars.DEPLOY_DOMAIN }}
          DEPLOY_SERVER=deploy-target
          DEPLOY_REMOTE_DIR=${{ vars.DEPLOY_REMOTE_DIR }}
          DEPLOY_REMOTE_BUILD_DIR="${{ vars.DEPLOY_REMOTE_BUILD_DIR }}"
          DEPLOY_SERVICE_NAME=${{ vars.DEPLOY_SERVICE_NAME }}
          DEPLOY_NGINX_SITE=${{ vars.DEPLOY_NGINX_SITE }}
          DEPLOY_PORT=${{ vars.DEPLOY_PORT }}
          DEPLOY_CRON_ENABLED=${{ vars.DEPLOY_CRON_ENABLED }}
          DEPLOY_ICON=${{ vars.DEPLOY_ICON }}
          DEPLOY_SEED=${{ vars.DEPLOY_SEED }}
          EOF

      - name: Deploy to staging
        run: DEPLOY_CI=true ./deploy.sh stage release-deploy ./release-binary/myapps

      - name: Smoke test
        run: |
          URL="https://${{ vars.DEPLOY_DOMAIN }}/login"
          echo "Checking smoke test..."
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w '%{http_code}' --max-time 10 "$URL" || true)
            echo "  Attempt $i: HTTP $STATUS"
            if [[ "$STATUS" == "200" ]]; then
              echo "Smoke test passed"
              exit 0
            fi
            sleep 5
          done
          echo "Smoke test failed — /login did not return 200"
          exit 1

  deploy-prod:
    name: Deploy to production
    needs: [release, deploy-stage]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v6

      - name: Download release binary
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p release-binary
          gh release download "${{ needs.release.outputs.tag }}" \
            --pattern "myapps" \
            --dir ./release-binary
          chmod +x ./release-binary/myapps

      - name: Mask sensitive values
        run: |
          echo "::add-mask::${{ vars.DEPLOY_SERVER }}"
          echo "::add-mask::$(echo "${{ vars.DEPLOY_SERVER }}" | cut -d@ -f2)"
          echo "::add-mask::${{ vars.DEPLOY_DOMAIN }}"
          echo "::add-mask::${{ vars.DEPLOY_REMOTE_DIR }}"

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "${{ secrets.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts
          cat >> ~/.ssh/config <<EOF
          Host deploy-target
            HostName $(echo "${{ vars.DEPLOY_SERVER }}" | cut -d@ -f2)
            User $(echo "${{ vars.DEPLOY_SERVER }}" | cut -d@ -f1)
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking yes
          EOF

      - name: Generate deploy config
        run: |
          cat > deploy/prod.env <<EOF
          DEPLOY_DOMAIN=${{ vars.DEPLOY_DOMAIN }}
          DEPLOY_SERVER=deploy-target
          DEPLOY_REMOTE_DIR=${{ vars.DEPLOY_REMOTE_DIR }}
          DEPLOY_REMOTE_BUILD_DIR="${{ vars.DEPLOY_REMOTE_BUILD_DIR }}"
          DEPLOY_SERVICE_NAME=${{ vars.DEPLOY_SERVICE_NAME }}
          DEPLOY_NGINX_SITE=${{ vars.DEPLOY_NGINX_SITE }}
          DEPLOY_PORT=${{ vars.DEPLOY_PORT }}
          DEPLOY_CRON_ENABLED=${{ vars.DEPLOY_CRON_ENABLED }}
          DEPLOY_ICON=${{ vars.DEPLOY_ICON }}
          DEPLOY_SEED=${{ vars.DEPLOY_SEED }}
          EOF

      - name: Deploy to production
        run: DEPLOY_CI=true ./deploy.sh prod release-deploy ./release-binary/myapps

      - name: Smoke test
        run: |
          URL="https://${{ vars.DEPLOY_DOMAIN }}/login"
          echo "Checking smoke test..."
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w '%{http_code}' --max-time 10 "$URL" || true)
            echo "  Attempt $i: HTTP $STATUS"
            if [[ "$STATUS" == "200" ]]; then
              echo "Smoke test passed"
              exit 0
            fi
            sleep 5
          done
          echo "Smoke test failed — /login did not return 200"
          exit 1
