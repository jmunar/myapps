name: CD

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: cd-deploy
  cancel-in-progress: false

jobs:
  release:
    name: Build & release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Read version and create tag
        id: version
        run: |
          VERSION=$(sed -n '/^\[package\]/,/^\[/{s/^version = "\(.*\)"/\1/p}' Cargo.toml)
          TAG="v$VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION (tag: $TAG)"

      - name: Validate version
        id: tag_check
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"

          # Get the latest existing tag (sorted by semver)
          LATEST=$(git tag -l 'v*' --sort=-version:refname | head -1 || echo "")

          if [[ "$LATEST" == "$TAG" ]]; then
            echo "::error::Version $VERSION already released (tag $TAG exists). Bump the version with make bump-{patch,minor,major}."
            exit 1
          fi

          if [[ -n "$LATEST" ]]; then
            LATEST_VER="${LATEST#v}"
            # Compare: sort both versions, if current isn't the greater one, fail
            HIGHER=$(printf '%s\n%s\n' "$LATEST_VER" "$VERSION" | sort -V | tail -1)
            if [[ "$HIGHER" != "$VERSION" ]]; then
              echo "::error::Version $VERSION is older than latest release $LATEST_VER. Bump the version with make bump-{patch,minor,major}."
              exit 1
            fi
          fi

          echo "exists=false" >> "$GITHUB_OUTPUT"
          echo "Version $VERSION is newer than ${LATEST:-none} ✓"

      - uses: dtolnay/rust-toolchain@stable
        if: steps.tag_check.outputs.exists == 'false'
        with:
          targets: aarch64-unknown-linux-gnu

      - uses: Swatinem/rust-cache@v2.9.1
        if: steps.tag_check.outputs.exists == 'false'
        with:
          key: aarch64

      - name: Install cross
        if: steps.tag_check.outputs.exists == 'false'
        uses: taiki-e/install-action@cross

      - name: Set up sccache
        if: steps.tag_check.outputs.exists == 'false'
        uses: mozilla-actions/sccache-action@v0.0.6

      - name: Cross-compile for aarch64
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          sed -i '/rustc-wrapper/d' .cargo/config.toml
          SCCACHE_PATH=$(which sccache)

          if sccache --start-server 2>/dev/null && sccache --show-stats 2>/dev/null; then
            echo "sccache backend is available — building with compilation cache"
            export CROSS_CONTAINER_OPTS="-e RUSTC_WRAPPER=sccache -e SCCACHE_GHA_ENABLED=true -e ACTIONS_CACHE_URL -e ACTIONS_RUNTIME_TOKEN -v $SCCACHE_PATH:/usr/local/bin/sccache:ro"
          else
            echo "::warning::sccache backend is unavailable — building without compilation cache"
            sccache --stop-server 2>/dev/null || true
          fi

          cross build --release --target aarch64-unknown-linux-gnu --features vendored-openssl

      - name: Create tag and GitHub Release
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Package release tarball
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          mkdir -p release-pkg
          cp target/aarch64-unknown-linux-gnu/release/myapps release-pkg/
          cp -r static release-pkg/
          tar -czf myapps-${{ steps.version.outputs.tag }}-aarch64.tar.gz -C release-pkg .

      - name: Publish GitHub Release
        if: steps.tag_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: myapps-${{ steps.version.outputs.tag }}-aarch64.tar.gz

  deploy-stage:
    name: Deploy to staging
    needs: release
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v6

      - name: Download and extract release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ needs.release.outputs.tag }}" \
            --pattern "myapps-*.tar.gz" \
            --dir .
          mkdir -p release-pkg
          tar -xzf myapps-*.tar.gz -C release-pkg
          chmod +x release-pkg/myapps

      - name: Mask sensitive values
        run: |
          echo "::add-mask::${{ vars.DEPLOY_SERVER }}"
          echo "::add-mask::$(echo "${{ vars.DEPLOY_SERVER }}" | cut -d@ -f2)"
          echo "::add-mask::${{ vars.DEPLOY_DOMAIN }}"
          echo "::add-mask::${{ vars.DEPLOY_REMOTE_DIR }}"

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "${{ secrets.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts
          cat >> ~/.ssh/config <<EOF
          Host deploy-target
            HostName $(echo "${{ vars.DEPLOY_SERVER }}" | cut -d@ -f2)
            User $(echo "${{ vars.DEPLOY_SERVER }}" | cut -d@ -f1)
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking yes
          EOF

      - name: Generate deploy config
        run: |
          cat > deploy/stage.env <<EOF
          DEPLOY_DOMAIN=${{ vars.DEPLOY_DOMAIN }}
          DEPLOY_SERVER=deploy-target
          DEPLOY_REMOTE_DIR=${{ vars.DEPLOY_REMOTE_DIR }}
          DEPLOY_REMOTE_BUILD_DIR="${{ vars.DEPLOY_REMOTE_BUILD_DIR }}"
          DEPLOY_SERVICE_NAME=${{ vars.DEPLOY_SERVICE_NAME }}
          DEPLOY_NGINX_SITE=${{ vars.DEPLOY_NGINX_SITE }}
          DEPLOY_PORT=${{ vars.DEPLOY_PORT }}
          DEPLOY_CRON_ENABLED=${{ vars.DEPLOY_CRON_ENABLED }}
          DEPLOY_ICON=${{ vars.DEPLOY_ICON }}
          DEPLOY_SEED=${{ vars.DEPLOY_SEED }}
          EOF

      - name: Deploy to staging
        run: DEPLOY_CI=true ./deploy.sh stage release-deploy ./release-pkg

      - name: Smoke test
        run: |
          URL="https://${{ vars.DEPLOY_DOMAIN }}/login"
          echo "Checking smoke test..."
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w '%{http_code}' --max-time 10 "$URL" || true)
            echo "  Attempt $i: HTTP $STATUS"
            if [[ "$STATUS" == "200" ]]; then
              echo "Smoke test passed"
              exit 0
            fi
            sleep 5
          done
          echo "Smoke test failed — /login did not return 200"
          exit 1

  deploy-prod:
    name: Deploy to production
    needs: [release, deploy-stage]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v6

      - name: Download and extract release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ needs.release.outputs.tag }}" \
            --pattern "myapps-*.tar.gz" \
            --dir .
          mkdir -p release-pkg
          tar -xzf myapps-*.tar.gz -C release-pkg
          chmod +x release-pkg/myapps

      - name: Mask sensitive values
        run: |
          echo "::add-mask::${{ vars.DEPLOY_SERVER }}"
          echo "::add-mask::$(echo "${{ vars.DEPLOY_SERVER }}" | cut -d@ -f2)"
          echo "::add-mask::${{ vars.DEPLOY_DOMAIN }}"
          echo "::add-mask::${{ vars.DEPLOY_REMOTE_DIR }}"

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "${{ secrets.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts
          cat >> ~/.ssh/config <<EOF
          Host deploy-target
            HostName $(echo "${{ vars.DEPLOY_SERVER }}" | cut -d@ -f2)
            User $(echo "${{ vars.DEPLOY_SERVER }}" | cut -d@ -f1)
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking yes
          EOF

      - name: Generate deploy config
        run: |
          cat > deploy/prod.env <<EOF
          DEPLOY_DOMAIN=${{ vars.DEPLOY_DOMAIN }}
          DEPLOY_SERVER=deploy-target
          DEPLOY_REMOTE_DIR=${{ vars.DEPLOY_REMOTE_DIR }}
          DEPLOY_REMOTE_BUILD_DIR="${{ vars.DEPLOY_REMOTE_BUILD_DIR }}"
          DEPLOY_SERVICE_NAME=${{ vars.DEPLOY_SERVICE_NAME }}
          DEPLOY_NGINX_SITE=${{ vars.DEPLOY_NGINX_SITE }}
          DEPLOY_PORT=${{ vars.DEPLOY_PORT }}
          DEPLOY_CRON_ENABLED=${{ vars.DEPLOY_CRON_ENABLED }}
          DEPLOY_ICON=${{ vars.DEPLOY_ICON }}
          DEPLOY_SEED=${{ vars.DEPLOY_SEED }}
          EOF

      - name: Deploy to production
        run: DEPLOY_CI=true ./deploy.sh prod release-deploy ./release-pkg

      - name: Smoke test
        run: |
          URL="https://${{ vars.DEPLOY_DOMAIN }}/login"
          echo "Checking smoke test..."
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w '%{http_code}' --max-time 10 "$URL" || true)
            echo "  Attempt $i: HTTP $STATUS"
            if [[ "$STATUS" == "200" ]]; then
              echo "Smoke test passed"
              exit 0
            fi
            sleep 5
          done
          echo "Smoke test failed — /login did not return 200"
          exit 1
